# Todoist Task List Widget for Dynacat
#
# REQUIRED: Set TODOIST_API_TOKEN in your Dynacat .env file.
#
# USAGE: Copy one of the widget definitions below into your Dynacat config.yml
# under a column's `widgets:` list.
#
# OPTIONS:
#   sorted_by:  priority | due_date | added_date  (default: priority)
#   sort_order: asc | desc                         (default: asc)
#   project_id: <your project ID>                  (omit for Inbox tasks only)
#
# HOW TO FIND YOUR PROJECT ID:
#   1. Open Todoist in your browser
#   2. Navigate to the project
#   3. The numeric ID is in the URL: todoist.com/app/project/2349823456
#
# ─────────────────────────────────────────────────────────────────────────────
# VARIANT 1: Inbox — tasks with no project (default, sorted by priority)
# ─────────────────────────────────────────────────────────────────────────────
- type: custom-api
  title: Todoist Inbox
  cache: 5m
  url: https://api.todoist.com/api/v1/tasks
  headers:
    Authorization: Bearer ${TODOIST_API_TOKEN}
  parameters:
    sorted_by: priority
    sort_order: asc
  template: |
    {{ $tasks := .JSON.Array "." }}
    {{ if eq (len $tasks) 0 }}
      <p class="color-subdue size-h5" style="padding:4px 0">Inbox zero — you're all caught up!</p>
    {{ else }}
    <ul class="list list-gap-10">
      {{ range $tasks }}
      {{ $p := .Int "priority" }}
      <li style="display:flex;align-items:baseline;gap:6px">
        {{ if eq $p 4 }}
          <span class="color-negative" title="Urgent" style="font-size:0.7em">&#9679;</span>
        {{ else if eq $p 3 }}
          <span class="color-highlight" title="High" style="font-size:0.7em">&#9679;</span>
        {{ else if eq $p 2 }}
          <span class="color-primary" title="Medium" style="font-size:0.7em">&#9679;</span>
        {{ else }}
          <span class="color-subdue" title="Normal" style="font-size:0.7em">&#9675;</span>
        {{ end }}
        <span>
          <a href="{{ .String "url" }}" class="color-primary-if-not-visited visited-indicator" target="_blank">{{ .String "content" }}</a>
          {{ if .Exists "due.date" }}
            <span class="color-subdue size-h6">&nbsp;{{ .String "due.string" }}</span>
          {{ end }}
        </span>
      </li>
      {{ end }}
    </ul>
    {{ end }}

