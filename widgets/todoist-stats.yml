# Todoist Stats & User Widget for Dynacat
#
# REQUIRED: Set TODOIST_API_TOKEN in your Dynacat .env file.
#
# USAGE: Copy a widget definition below into your Dynacat config.yml
# under a column's `widgets:` list.
#
# NOTE ON KARMA / STREAKS:
#   The old Todoist Sync API v9 (which exposed karma, streaks, and daily goals)
#   was shut down in February 2026. The new API v1 /user endpoint returns basic
#   user profile data. Karma fields may or may not be present depending on your
#   account and Todoist's current API v1 response.
#
#   The widget below will display karma if available, and gracefully fall back
#   to a summary if not. To inspect exactly what your account returns, see the
#   troubleshooting section in README.md.
#
# ─────────────────────────────────────────────────────────────────────────────
# VARIANT 1: User stats with karma (shows whatever the API returns)
# Also fetches task count as a useful productivity metric
# ─────────────────────────────────────────────────────────────────────────────
- type: custom-api
  title: Todoist Stats
  cache: 30m
  url: https://api.todoist.com/api/v1/user
  headers:
    Authorization: Bearer ${TODOIST_API_TOKEN}
  subrequests:
    tasks:
      url: https://api.todoist.com/api/v1/tasks
      headers:
        Authorization: Bearer ${TODOIST_API_TOKEN}
  template: |
    {{ $name := .JSON.String "full_name" }}
    {{ $email := .JSON.String "email" }}
    {{ $premium := .JSON.Bool "is_premium" }}
    {{ $tasks := (.Subrequest "tasks").JSON.Array "." }}

    <div style="display:flex;flex-direction:column;gap:8px">

      {{/* User identity */}}
      <div>
        <span class="size-h4 color-highlight">{{ $name }}</span>
        {{ if $premium }}
          <span class="size-h6 color-positive" style="margin-left:6px">Pro</span>
        {{ end }}
        <br>
        <span class="size-h6 color-subdue">{{ $email }}</span>
      </div>

      {{/* Open task count — always available */}}
      <div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-top:1px solid rgba(128,128,128,0.15)">
        <span class="color-subdue size-h6">Open tasks</span>
        <span class="color-primary size-h5" style="font-weight:600">{{ len $tasks }}</span>
      </div>

      {{/* Karma — display if returned by API */}}
      {{ if .JSON.Exists "karma" }}
      <div style="display:flex;align-items:center;gap:6px">
        <span class="color-subdue size-h6">Karma</span>
        <span class="color-highlight size-h5" style="font-weight:600">{{ .JSON.Int "karma" }}</span>
      </div>
      {{ end }}

      {{ if .JSON.Exists "karma_trend" }}
      <div style="display:flex;align-items:center;gap:6px">
        <span class="color-subdue size-h6">Karma trend</span>
        {{ $trend := .JSON.String "karma_trend" }}
        {{ if eq $trend "up" }}
          <span class="color-positive size-h6">&#9650; up</span>
        {{ else if eq $trend "down" }}
          <span class="color-negative size-h6">&#9660; down</span>
        {{ else }}
          <span class="color-subdue size-h6">&#8212; same</span>
        {{ end }}
      </div>
      {{ end }}

      {{ if .JSON.Exists "daily_goal" }}
      <div style="display:flex;align-items:center;gap:6px">
        <span class="color-subdue size-h6">Daily goal</span>
        <span class="color-primary size-h6">{{ .JSON.Int "daily_goal" }} tasks/day</span>
      </div>
      {{ end }}

      {{ if .JSON.Exists "weekly_goal" }}
      <div style="display:flex;align-items:center;gap:6px">
        <span class="color-subdue size-h6">Weekly goal</span>
        <span class="color-primary size-h6">{{ .JSON.Int "weekly_goal" }} tasks/week</span>
      </div>
      {{ end }}

      {{ if .JSON.Exists "completed_today" }}
      <div style="display:flex;align-items:center;gap:6px">
        <span class="color-subdue size-h6">Completed today</span>
        <span class="color-positive size-h6">{{ .JSON.Int "completed_today" }}</span>
      </div>
      {{ end }}

      {{ if .JSON.Exists "streak_days" }}
      <div style="display:flex;align-items:center;gap:6px">
        <span class="color-subdue size-h6">Current streak</span>
        <span class="color-highlight size-h6">{{ .JSON.Int "streak_days" }} days &#128293;</span>
      </div>
      {{ end }}

    </div>

# ─────────────────────────────────────────────────────────────────────────────
