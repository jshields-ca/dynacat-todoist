# Todoist Projects Overview Widget for Dynacat
#
# REQUIRED: Set TODOIST_API_TOKEN in your Dynacat .env file.
#
# USAGE: Copy the widget definition below into your Dynacat config.yml
# under a column's `widgets:` list.
#
# This widget displays all your Todoist projects as a browsable list.
# It also makes a subrequest to fetch your open tasks so it can show
# a task count badge next to each project name.
#
# ─────────────────────────────────────────────────────────────────────────────
# VARIANT 1: Projects list with open task counts
# ─────────────────────────────────────────────────────────────────────────────
- type: custom-api
  title: Todoist Projects
  cache: 10m
  url: https://api.todoist.com/api/v1/projects
  headers:
    Authorization: Bearer ${TODOIST_API_TOKEN}
  subrequests:
    tasks:
      url: https://api.todoist.com/api/v1/tasks
      headers:
        Authorization: Bearer ${TODOIST_API_TOKEN}
  template: |
    {{ $projects := .JSON.Array "." }}
    {{ $tasks := (.Subrequest "tasks").JSON.Array "." }}
    {{ if eq (len $projects) 0 }}
      <p class="color-subdue size-h5" style="padding:4px 0">No projects found.</p>
    {{ else }}
    <ul class="list list-gap-10">
      {{ range $projects }}
      {{ $pid := .String "id" }}
      {{ $name := .String "name" }}
      {{ $count := 0 }}
      {{ range $tasks }}
        {{ if eq (.String "project_id") $pid }}
          {{ $count = add $count 1 }}
        {{ end }}
      {{ end }}
      <li style="display:flex;align-items:center;justify-content:space-between">
        <span class="color-primary">{{ $name }}</span>
        {{ if gt $count 0 }}
          <span class="color-subdue size-h6"
                style="background:rgba(128,128,128,0.15);border-radius:10px;padding:1px 7px;min-width:20px;text-align:center">
            {{ $count }}
          </span>
        {{ else }}
          <span class="color-subdue size-h6" style="opacity:0.4">0</span>
        {{ end }}
      </li>
      {{ end }}
    </ul>
    <p class="color-subdue size-h6" style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(128,128,128,0.2)">
      {{ len $tasks }} open task{{ if ne (len $tasks) 1 }}s{{ end }} across {{ len $projects }} project{{ if ne (len $projects) 1 }}s{{ end }}
    </p>
    {{ end }}

