# Todoist — Full Example Dynacat Page
#
# Drop this into your Dynacat config.yml as a new page, or copy individual
# widget blocks into an existing page.
#
# REQUIRED before use:
#   1. Add TODOIST_API_TOKEN=your_token to your Dynacat .env file
#   2. Replace project IDs with your actual project IDs (see README for how)
#   3. Restart Dynacat
#
# ─────────────────────────────────────────────────────────────────────────────

- name: Todoist
  columns:
    # ── Left column: Stats + Projects ─────────────────────────────────────────
    - size: small
      widgets:

        # User stats (karma displayed if available from API v1)
        - type: custom-api
          title: Todoist Stats
          cache: 30m
          url: https://api.todoist.com/api/v1/user
          headers:
            Authorization: Bearer ${TODOIST_API_TOKEN}
          subrequests:
            tasks:
              url: https://api.todoist.com/api/v1/tasks
              headers:
                Authorization: Bearer ${TODOIST_API_TOKEN}
          template: |
            {{ $tasks := (.Subrequest "tasks").JSON.Array "." }}
            <div style="display:flex;flex-direction:column;gap:8px">
              <div style="display:flex;align-items:center;gap:6px">
                <span class="color-subdue size-h5">Open tasks</span>
                <span class="color-primary size-h4" style="font-weight:600">{{ len $tasks }}</span>
              </div>
              {{ if .JSON.Exists "karma" }}
              <div style="display:flex;align-items:center;gap:6px">
                <span class="color-subdue size-h5">Karma</span>
                <span class="color-highlight size-h4" style="font-weight:600">{{ .JSON.Int "karma" }}</span>
                {{ if .JSON.Exists "karma_trend" }}
                  {{ $trend := .JSON.String "karma_trend" }}
                  {{ if eq $trend "up" }}<span class="color-positive size-h5">&#9650;</span>
                  {{ else if eq $trend "down" }}<span class="color-negative size-h5">&#9660;</span>
                  {{ end }}
                {{ end }}
              </div>
              {{ end }}
              {{ if .JSON.Exists "streak_days" }}
              <div style="display:flex;align-items:center;gap:6px">
                <span class="color-subdue size-h5">Streak</span>
                <span class="color-highlight size-h5">{{ .JSON.Int "streak_days" }} days &#128293;</span>
              </div>
              {{ end }}
            </div>

        # All projects with open task counts
        - type: custom-api
          title: Projects
          cache: 10m
          url: https://api.todoist.com/api/v1/projects
          headers:
            Authorization: Bearer ${TODOIST_API_TOKEN}
          subrequests:
            tasks:
              url: https://api.todoist.com/api/v1/tasks
              headers:
                Authorization: Bearer ${TODOIST_API_TOKEN}
          template: |
            {{ $projects := .JSON.Array "results" }}
            {{ $tasks := (.Subrequest "tasks").JSON.Array "." }}
            <ul class="list list-gap-10">
              {{ range $projects }}
              {{ $pid := .String "id" }}
              {{ $count := 0 }}
              {{ range $tasks }}
                {{ if eq (.String "projectId") $pid }}{{ $count = add $count 1 }}{{ end }}
              {{ end }}
              <li style="display:flex;align-items:center;justify-content:space-between">
                <span class="color-primary">{{ .String "name" }}</span>
                {{ if gt $count 0 }}
                  <span class="color-subdue size-h6"
                        style="background:rgba(128,128,128,0.15);border-radius:10px;padding:1px 7px">{{ $count }}</span>
                {{ end }}
              </li>
              {{ end }}
            </ul>
            <p class="color-subdue size-h6" style="margin-top:10px;padding-top:6px;border-top:1px solid rgba(128,128,128,0.15)">
              {{ len $tasks }} open across {{ len $projects }} project{{ if ne (len $projects) 1 }}s{{ end }}
            </p>

    # ── Right column: Task Lists ───────────────────────────────────────────────
    - size: full
      widgets:

        # Inbox — all tasks not assigned to a project, sorted by priority
        - type: custom-api
          title: Inbox
          cache: 5m
          url: https://api.todoist.com/api/v1/tasks
          headers:
            Authorization: Bearer ${TODOIST_API_TOKEN}
          template: |
            {{ $tasks := .JSON.Array "." }}
            {{ if eq (len $tasks) 0 }}
              <p class="color-positive size-h5" style="padding:4px 0">&#10003; Inbox zero!</p>
            {{ else }}
            <ul class="list list-gap-10">
              {{ range $tasks }}
              {{ $p := .Int "priority" }}
              <li style="display:flex;align-items:baseline;gap:6px">
                {{ if eq $p 4 }}<span class="color-negative" title="Urgent">&#9679;</span>
                {{ else if eq $p 3 }}<span class="color-highlight" title="High">&#9679;</span>
                {{ else if eq $p 2 }}<span class="color-primary" title="Medium">&#9679;</span>
                {{ else }}<span class="color-subdue" title="Normal">&#9675;</span>
                {{ end }}
                <span>
                  <a href="{{ .String "url" }}" class="color-primary-if-not-visited visited-indicator" target="_blank">{{ .String "content" }}</a>
                  {{ if .Exists "due.date" }}<span class="color-subdue size-h6">&nbsp;{{ .String "due.string" }}</span>{{ end }}
                </span>
              </li>
              {{ end }}
            </ul>
            {{ end }}

